<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nebula IA - Plataforma Oficial</title>
    <link class="rounded-full" rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #030303; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .gold-gradient { background: linear-gradient(135deg, #ffe066 0%, #f59e0b 100%); }
        .gold-text { background: linear-gradient(135deg, #ffe066 0%, #f59e0b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-panel { background: rgba(18, 18, 24, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .tono-btn { font-size: 0.65rem; font-weight: 700; padding: 0.35rem 0.75rem; border-radius: 9999px; border: 1px solid #27272a; color: #a1a1aa; transition: all 0.3s; cursor: pointer; white-space: nowrap; }
        .activo-gold { background: linear-gradient(135deg, #ffe066 0%, #f59e0b 100%); color: black !important; border: none; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen h-[100dvh] overflow-hidden flex flex-col">

    <div id="view-app" class="flex flex-col md:flex-row overflow-hidden bg-[#030303] h-full w-full">
        <aside class="w-64 bg-black border-r border-zinc-900 hidden md:flex flex-col p-4 justify-between shrink-0">
            <div>
                <div class="flex items-center gap-3 mb-6 px-2">
                    <img src="logo.png" class="w-8 h-8 rounded-full border border-amber-500/30">
                    <span class="text-sm font-bold uppercase tracking-wider text-zinc-300">Nebula Enterprise</span>
                </div>
                <button onclick="window.startNewChat()" class="w-full mb-6 border border-zinc-800 bg-zinc-900/30 text-zinc-300 font-bold py-2.5 px-3 rounded-xl text-xs uppercase flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus text-amber-500"></i> Nuevo Análisis
                </button>
                <nav class="space-y-1">
                    <div class="text-[10px] text-zinc-600 font-bold uppercase px-2 mb-2">Hilos de Conversación</div>
                    <div id="chats-history-list" class="space-y-1 max-h-[55vh] overflow-y-auto pr-1">
                        <div class="text-[11px] text-zinc-500 px-2 italic">Cargando historial...</div>
                    </div>
                </nav>
            </div>
        </aside>

        <main class="flex-1 bg-[#060608] flex flex-col min-h-0 overflow-hidden relative">
            <div id="chat-scroller" class="flex-1 overflow-y-auto p-4 flex flex-col items-center space-y-6">
                <div id="app-initial" class="my-auto max-w-xl text-center flex flex-col items-center">
                    <img src="logo.png" class="w-20 h-20 mb-4 rounded-2xl border border-zinc-800">
                    <h3 class="text-xl font-black mb-1">Ecosistema Analítico Nebula</h3>
                </div>
                <div id="ai-loading-skeleton" class="hidden w-full max-w-3xl pt-2 space-y-4">
                    <div class="p-5 rounded-2xl bg-zinc-900/20 border border-zinc-900/60 text-center">
                        <div id="loading-status-text" class="text-xs font-black text-amber-400 uppercase">Analizando...</div>
                    </div>
                </div>
                <div id="app-results" class="hidden w-full max-w-3xl space-y-6 pt-2">
                    <div id="ai-response-content" class="space-y-4"></div>
                </div>
            </div>

            <div class="p-4 bg-zinc-950/90 border-t border-zinc-900 shrink-0">
                <div class="max-w-3xl mx-auto glass-panel rounded-xl p-3 flex flex-col gap-2">
                    <textarea id="mensaje" rows="2" class="w-full bg-transparent p-1 text-sm text-white focus:outline-none placeholder-zinc-700 resize-none font-medium" placeholder="Escribe aquí..."></textarea>
                    <div class="flex items-center justify-between border-t border-zinc-900 pt-2 px-1">
                        <input type="file" id="foto" accept="image/*" class="hidden">
                        <label for="foto" class="cursor-pointer text-zinc-500 hover:text-amber-500 text-xs font-semibold py-1">
                            <i class="fa-solid fa-paperclip"></i> Adjuntar
                        </label>
                        <button onclick="executeProductionAnalysis()" id="main-action-btn" class="gold-gradient text-black px-5 py-2 rounded-xl text-xs font-black uppercase shadow-md">
                            Analizar
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEEGchpUa4HNuUt_q59XU_t65AwjwA_KM",
            authDomain: "nebula-2b57e.firebaseapp.com",
            projectId: "nebula-2b57e",
            storageBucket: "nebula-2b57e.firewastorage.app",
            messagingSenderId: "456903759244",
            appId: "1:456903759244:web:5d939ac48b5e5bfa55f2a9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CORRECCIÓN CRÍTICA: Búsqueda Inteligente Dual (Email o UID) ---
        window.loadChatHistory = async function(user) {
            const historyContainer = document.getElementById('chats-history-list');
            if (!historyContainer) return;
            
            const emailPath = user.email ? user.email.toLowerCase() : null;
            const uidPath = user.uid;

            try {
                let snapshot;
                let pathUsed = "";

                // 1. Intentar con Email
                if (emailPath) {
                    const emailRef = collection(db, "usuarios", emailPath, "historial");
                    snapshot = await getDocs(query(emailRef, orderBy("fecha", "desc")));
                    if (!snapshot.empty) pathUsed = emailPath;
                }

                // 2. Si no hay datos en Email, intentar con UID (Compatibilidad legado)
                if (!pathUsed && uidPath) {
                    const uidRef = collection(db, "usuarios", uidPath, "historial");
                    snapshot = await getDocs(query(uidRef, orderBy("fecha", "desc")));
                    if (!snapshot.empty) pathUsed = uidPath;
                }

                if (!pathUsed || snapshot.empty) {
                    historyContainer.innerHTML = `<div class="text-[11px] text-zinc-500 px-2 italic">Sin análisis previos</div>`;
                    return;
                }

                let html = '';
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    const prompt = data.mensajeUsuario || data.prompt || "Captura analizada";
                    
                    html += `
                        <div onclick="window.viewPastChat('${pathUsed}', '${id}', this)" class="cursor-pointer p-2.5 rounded-xl text-xs text-zinc-400 hover:bg-zinc-900 border-l-2 border-transparent hover:border-amber-500 transition-all truncate">
                            ${prompt.substring(0, 20)}...
                        </div>
                    `;
                });
                historyContainer.innerHTML = html;
            } catch (e) {
                console.error("Error al cargar historial:", e);
            }
        };

        window.viewPastChat = async function(path, docId, element) {
            try {
                const docRef = doc(db, "usuarios", path, "historial", docId);
                const docSnap = await getDoc(docRef);
                if (!docSnap.exists()) return;
                
                const data = docSnap.data();
                document.getElementById('app-initial').classList.add('hidden');
                document.getElementById('app-results').classList.remove('hidden');
                document.getElementById('ai-response-content').innerText = data.respuestaNebula || data.respuesta || "Sin respuesta";
            } catch (e) { console.error(e); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.loadChatHistory(user); // Pasamos el usuario completo
            }
        });

        // Simulación de función de ejecución (limpia)
        window.executeProductionAnalysis = async function() {
            alert("Análisis iniciado...");
            // Aquí iría tu lógica de fetch al servidor
        };
        
        window.startNewChat = function() {
            document.getElementById('app-results').classList.add('hidden');
            document.getElementById('app-initial').classList.remove('hidden');
        };
    </script>
</body>
</html>
